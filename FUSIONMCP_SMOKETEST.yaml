version: 1
name: FusionMCP Smoke Test (Consolidated)
purpose: >
  Schnelltest fuer KI-Agenten, um die neue Batch-Architektur (Core Tools)
  von FusionMCP zu pruefen. Testet Skizzen-Batching und Geometrie-Batching.

prerequisites:
  - Fusion 360 is running
  - FusionMCP add-in is active
  - MCP server is running

abort_rules:
  - if_step_fails: bridge_check
    reason: Bridge not reachable
  - if_step_fails: mcp_check
    reason: MCP not reachable

success_criteria:
  - All batch steps complete without parameter errors
  - Box is created via apply_3d_features
  - Sketch with multiple shapes (polygon, circle) is created via edit_sketch
  - Export works via export_model
  - Analysis returns plausible data

steps:
  - id: bridge_check
    type: http
    method: GET
    target: http://localhost:8082
    expected:
      response_type: json
      contains:
        - status
    required: true

  - id: mcp_check
    type: http
    method: GET
    target: http://localhost:8081/mcp
    expected:
      response_type: json
      contains:
        status: mcp_server_online
    required: true

  - id: cleanup_before_test
    type: mcp_tool
    tool:
      en: manage_design
    args:
      action: cleanup
    expected:
      response_contains_any:
        - Entwurf bereinigt.
        - Design cleaned up.
    required: true

  - id: restart_mcp
    type: mcp_tool
    tool:
      en: manage_design
    args:
      action: restart_mcp
    expected:
      response_contains_any:
        - MCP restart command sent.
        - MCP-Neustart-Befehl gesendet.
    required: true

  - id: create_box_batch
    type: mcp_tool
    tool:
      en: apply_3d_features
    args:
      operations:
        - action: create_box
          l: 10
          w: 10
          h: 5
          name: SmokeBox
    expected:
      response_contains: geometry_updated
      fusion_visible:
        body_names:
          - SmokeBox
    required: true

  - id: create_sketch
    type: mcp_tool
    tool:
      en: create_sketch
    args:
      name: SmokeSketch
      plane_name: XY
    expected:
      response_contains: sketch_created
    required: true

  - id: edit_sketch_batch
    type: mcp_tool
    tool:
      en: edit_sketch
    args:
      sketch_name: SmokeSketch
      operations:
        - action: draw_polygon
          cx: 10
          cy: 10
          radius: 3
          sides: 6
        - action: draw_circle
          x: 20
          y: 10
          radius: 2
    expected:
      response_contains: sketch_updated
    required: true

  - id: edit_parameters_batch
    type: mcp_tool
    tool:
      en: edit_parameters
    args:
      operations:
        - action: set
          name: test_param
          expression: "42mm"
    expected:
      response_contains: parameters_updated
    required: true

  - id: export_step_model
    type: mcp_tool
    tool:
      en: export_model
    args:
      format: step
      filename: smoke_test_model
    expected:
      response_contains: Exported to
    required: true

  - id: analyze_design
    type: mcp_tool
    tool:
      en: analyze_design
    args:
      action: validate
    expected:
      response_type: json_or_json_string
    required: true

  - id: visual_check
    type: mcp_tool
    tool:
      en: capture_view
    args: {}
    expected:
      response_type: image
    required: false

  - id: cleanup_after_test
    type: mcp_tool
    tool:
      en: manage_design
    args:
      action: cleanup
    expected:
      response_contains: Design cleaned up.
    required: true

notes:
  - >
    Dieser Smoke-Test verifiziert die Funktionsfaehigkeit der Batch-Tools.
    Die einzelnen Operationen (draw_line etc.) sind nun Teil der 'operations' Arrays.
