name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "FusionMCP.py"
      - "FusionMCP.manifest"
      - "fusion_mcp_server.py"
      - "requirements.txt"
      - "README.md"
      - "CHANGELOG.md"
      - "core/**"
      - "modules/**"
      - "docs/**"
      - "scripts/generate_ai_usage.py"
      - "installer/windows/**"
      - ".github/workflows/build-windows-installer.yml"

jobs:
  build-installer:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read add-in version from manifest
        id: version
        shell: powershell
        run: |
          $manifest = Get-Content "$env:GITHUB_WORKSPACE\FusionMCP.manifest" -Raw | ConvertFrom-Json
          $version = [string]$manifest.version
          if (-not $version) {
            throw "No version found in FusionMCP.manifest"
          }
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Install Inno Setup
        shell: powershell
        run: |
          choco install innosetup --no-progress -y

      - name: Compile installer
        shell: powershell
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }
          & $iscc "/DMyAppVersion=${{ steps.version.outputs.version }}" "$env:GITHUB_WORKSPACE\installer\windows\FusionMCP.iss"

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: FusionMCP-Windows-Installer-${{ steps.version.outputs.version }}
          path: installer/windows/output/FusionMCP-Setup-${{ steps.version.outputs.version }}.exe
          if-no-files-found: error
